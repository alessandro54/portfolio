name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://alessandro.chumpitaz.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --cache-dir=.turbo
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ vars.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ vars.PUBLIC_SANITY_DATASET }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=portfolio --branch=main --commit-dirty=true

  lighthouse:
    name: Lighthouse Audit
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lighthouse audit
        id: lh
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://alessandro.chumpitaz.dev/en/
          runs: 3
          configPath: .github/lighthouse/config.json
          budgetPath: .github/lighthouse/budget.json
          uploadArtifacts: true

      - name: Extract scores
        id: scores
        run: |
          manifest='${{ steps.lh.outputs.manifest }}'
          perf=$(echo "$manifest" | jq '.[0].summary.performance * 100 | floor')
          a11y=$(echo "$manifest" | jq '.[0].summary.accessibility * 100 | floor')
          bp=$(echo "$manifest" | jq '.[0].summary."best-practices" * 100 | floor')
          seo=$(echo "$manifest" | jq '.[0].summary.seo * 100 | floor')
          json_path=$(echo "$manifest" | jq -r '.[0].jsonPath')
          if [ -f "$json_path" ]; then
            bytes=$(jq '.audits["total-byte-weight"].numericValue // 0 | floor' "$json_path")
            kb=$(echo "scale=0; $bytes / 1024" | bc)
            echo "page_size=${kb} KiB" >> "$GITHUB_OUTPUT"
          else
            echo "page_size=N/A" >> "$GITHUB_OUTPUT"
          fi
          echo "performance=$perf" >> "$GITHUB_OUTPUT"
          echo "accessibility=$a11y" >> "$GITHUB_OUTPUT"
          echo "best-practices=$bp" >> "$GITHUB_OUTPUT"
          echo "seo=$seo" >> "$GITHUB_OUTPUT"

      - name: Update Performance badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.LIGHTHOUSE_GIST_ID }}
          filename: lighthouse_performance.json
          label: Performance
          message: ${{ steps.scores.outputs.performance }}
          valColorRange: ${{ steps.scores.outputs.performance }}
          minColorRange: 0
          maxColorRange: 100
          namedLogo: lighthouse
          logoColor: white

      - name: Update Accessibility badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.LIGHTHOUSE_GIST_ID }}
          filename: lighthouse_accessibility.json
          label: Accessibility
          message: ${{ steps.scores.outputs.accessibility }}
          valColorRange: ${{ steps.scores.outputs.accessibility }}
          minColorRange: 0
          maxColorRange: 100
          namedLogo: lighthouse
          logoColor: white

      - name: Update Best Practices badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.LIGHTHOUSE_GIST_ID }}
          filename: lighthouse_best_practices.json
          label: Best Practices
          message: ${{ steps.scores.outputs.best-practices }}
          valColorRange: ${{ steps.scores.outputs.best-practices }}
          minColorRange: 0
          maxColorRange: 100
          namedLogo: lighthouse
          logoColor: white

      - name: Update SEO badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.LIGHTHOUSE_GIST_ID }}
          filename: lighthouse_seo.json
          label: SEO
          message: ${{ steps.scores.outputs.seo }}
          valColorRange: ${{ steps.scores.outputs.seo }}
          minColorRange: 0
          maxColorRange: 100
          namedLogo: lighthouse
          logoColor: white

      - name: Update Page Size badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.LIGHTHOUSE_GIST_ID }}
          filename: lighthouse_page_size.json
          label: Page Weight
          message: ${{ steps.scores.outputs.page_size }}
          color: brightgreen
          namedLogo: cloudflare
          logoColor: white
